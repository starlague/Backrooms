<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labyrinthe 3D — ThreeJS 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ================================================================
       OVERLAY — Écran de démarrage
       ================================================================ -->
  <div class="overlay" id="startOverlay">
    <h1>🌀 Labyrinthe 3D</h1>
    <p>Trouvez la sortie le plus vite possible !</p>

    <div id="seedRow">
      <label for="seedInput">Seed :</label>
      <input id="seedInput" type="text" placeholder="Aléatoire" />
      <button class="btn" onclick="startGame()">Jouer</button>
    </div>

    <div style="display:flex; gap:8px; margin-top:8px;">
      <button id="exportBtn" onclick="exportMaze()" style="display:none;">
        💾 Exporter labyrinthe
      </button>
      <label id="importLabel">
        📂 Importer labyrinthe
        <input id="importFile" type="file" accept=".json" onchange="importMaze(event)" />
      </label>
    </div>

    <div id="modeToggle">
      <label>
        <input type="checkbox" id="multiCheck" onchange="toggleMulti()" />
        Mode Multijoueur (local)
      </label>
    </div>

    <p style="font-size:0.8em; color:#666; margin-top:12px;">
      ZQSD / WASD = déplacer &nbsp;|&nbsp; C = changer caméra
    </p>
  </div>

  <!-- ================================================================
       OVERLAY — Écran de victoire
       ================================================================ -->
  <div class="overlay" id="winOverlay">
    <h1 id="winTitle">🏆 Bravo !</h1>
    <p id="winMsg"></p>
    <p id="winTime"></p>
    <button class="btn" onclick="restartGame()">🔄 Rejouer (même labyrinthe)</button>
    <button class="btn secondary" style="margin-top:8px;" onclick="newGame()">
      🆕 Nouveau labyrinthe
    </button>
  </div>

  <!-- ================================================================
       HUD — Chronomètre & bouton caméra
       ================================================================ -->
  <div id="ui">
    <span id="timer">⏱ 00:00</span>
    <button id="cameraBtn" onclick="toggleCamera()">📷 Vue dessus</button>
  </div>

  <!-- Labels split-screen multijoueur -->
  <div id="p1label">Joueur 1</div>
  <div id="p2label">Joueur 2</div>

  <!-- Aide contrôles (bas de page) -->
  <div id="controls-hint">
    ZQSD / ↑↓←→ = déplacer &nbsp;|&nbsp; C = caméra &nbsp;|&nbsp; Multijoueur : P1=WASD, P2=IJKL
  </div>

  <!-- ================================================================
       SCRIPTS
       ================================================================ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="main.js"></script>

</body>
</html>
